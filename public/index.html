<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>DJTC SHIFT V2.02.02</title>

    <link rel="apple-touch-icon" href="/icon.png" />

  </head>
  <!-- 🚨 핵심 3: HTML 렌더링 즉시 배경을 어둡게 칠해서 흰색 번쩍임 원천 차단 -->
